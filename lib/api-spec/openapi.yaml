        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        sceneCount: { type: integer }
        promptCount: { type: integer }
        exportCount: { type: integer }
        durationSec: { type: number }
        bpm: { type: number }
        keySignature: { type: string }
        brandPresetId:
          type: string
          nullable: true

    ProjectDetail:
      allOf:
