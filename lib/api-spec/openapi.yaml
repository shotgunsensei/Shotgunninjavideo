openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Shotgun Ninjas Video Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: projects
  - name: audio
  - name: timeline
  - name: storyboard
  - name: lyrics
  - name: prompts
  - name: exports
  - name: settings
  - name: stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Dashboard overview stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
    patch:
      operationId: updateProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{id}/audio:
    post:
      operationId: uploadAudio
      tags: [audio]
      summary: Register an uploaded audio file (metadata only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadAudioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioFile"

  /projects/{id}/analyze:
    post:
      operationId: analyzeAudio
      tags: [audio]
      summary: Submit audio analysis (client-computed); falls back to deterministic mock if no body provided
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /projects/{id}/analysis:
    get:
      operationId: getAnalysis
      tags: [audio]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /projects/{id}/timeline:
    get:
      operationId: getTimeline
      tags: [timeline]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /projects/{id}/timeline/segments:
    post:
      operationId: createSegment
      tags: [timeline]
      summary: Insert a new timeline segment at a given time
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /timeline-segments/{segmentId}:
    patch:
      operationId: updateSegment
      tags: [timeline]
      parameters:
        - in: path
          name: segmentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSegmentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"
    delete:
      operationId: deleteSegment
      tags: [timeline]
      parameters:
        - in: path
          name: segmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /timeline-segments/{segmentId}/split:
    post:
      operationId: splitSegment
      tags: [timeline]
      summary: Split a segment in two at the given time (defaults to midpoint)
      parameters:
        - in: path
          name: segmentId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitSegmentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /projects/{id}/storyboard:
    get:
      operationId: getStoryboard
      tags: [storyboard]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"
    post:
      operationId: generateStoryboard
      tags: [storyboard]
      summary: Generate storyboard scenes from analyzed timeline
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryboardInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /projects/{id}/storyboard/scenes:
    post:
      operationId: addScene
      tags: [storyboard]
      summary: Add a new storyboard scene (optionally after a given index)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSceneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /storyboard/{sceneId}:
    patch:
      operationId: updateScene
      tags: [storyboard]
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSceneInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardScene"
    delete:
      operationId: deleteScene
      tags: [storyboard]
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /storyboard/{sceneId}/regenerate:
    post:
      operationId: regenerateScene
      tags: [storyboard]
      summary: Regenerate the contents of a single scene (respects locked unless force=true)
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardScene"

  /storyboard/{sceneId}/duplicate:
    post:
      operationId: duplicateScene
      tags: [storyboard]
      summary: Duplicate a scene immediately after itself
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /projects/{id}/lyrics:
    get:
      operationId: getLyrics
      tags: [lyrics]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"
    put:
      operationId: saveLyrics
      tags: [lyrics]
      summary: Replace the project's lyric lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveLyricsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"

  /projects/{id}/lyrics/parse:
    post:
      operationId: parseLyrics
      tags: [lyrics]
      summary: Parse raw lyric text into structured lines (does not save)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseLyricsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseLyricsResult"

  /projects/{id}/lyrics/auto-assign:
    post:
      operationId: autoAssignLyrics
      tags: [lyrics]
      summary: Distribute untimestamped, unassigned lyric lines evenly across storyboard scenes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"

  /lyric-lines/{lineId}:
    patch:
      operationId: updateLyricLine
      tags: [lyrics]
      parameters:
        - in: path
          name: lineId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLyricLineInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LyricLine"
    delete:
      operationId: deleteLyricLine
      tags: [lyrics]
      parameters:
        - in: path
          name: lineId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"

  /projects/{id}/prompts:
    get:
      operationId: getPrompts
      tags: [prompts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"
    post:
      operationId: generatePrompts
      tags: [prompts]
      summary: Generate scene prompts from storyboard
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"

  /prompts/{promptId}:
    patch:
      operationId: updatePrompt
      tags: [prompts]
      parameters:
        - in: path
          name: promptId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"

  /projects/{id}/exports:
    get:
      operationId: listExports
      tags: [exports]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExportRecord"
    post:
      operationId: createExport
      tags: [exports]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportRecord"

  /projects/{id}/continuity:
    get:
      operationId: getContinuity
      tags: [continuity]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Continuity"
    put:
      operationId: updateContinuity
      tags: [continuity]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContinuityInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Continuity"

  /projects/{id}/continuity/apply:
    post:
      operationId: applyContinuity
      tags: [continuity]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContinuityApplyResult"

  /projects/{id}/prompt-engine:
    get:
      operationId: getPromptEngine
      tags: [prompts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptEngineResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    StatsOverview:
      type: object
      required:
        - totalProjects
        - totalScenes
        - totalPrompts
        - totalExports
        - analyzedProjects
      properties:
        totalProjects: { type: integer }
        totalScenes: { type: integer }
        totalPrompts: { type: integer }
        totalExports: { type: integer }
        analyzedProjects: { type: integer }

    ActivityItem:
      type: object
      required: [id, kind, message, projectId, createdAt]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [project_created, audio_uploaded, analyzed, storyboard_generated, prompts_generated, exported]
        message: { type: string }
        projectId: { type: string }
        projectTitle: { type: string }
        createdAt: { type: string, format: date-time }

    Project:
      type: object
      required:
        - id
        - title
        - status
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        title: { type: string }
        artist: { type: string }
        genre: { type: string }
        mood: { type: string }
        visualDirection: { type: string }
        visualStyle: { type: string }
        brandDirection: { type: string }
        lyrics: { type: string }
        status:
          type: string
          enum: [draft, uploaded, analyzed, storyboarded, prompted, exported]
        coverColor: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        sceneCount: { type: integer }
        promptCount: { type: integer }
        exportCount: { type: integer }
        durationSec: { type: number }
        bpm: { type: number }
        keySignature: { type: string }

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            audio:
              $ref: "#/components/schemas/AudioFile"
            analysis:
              $ref: "#/components/schemas/AnalysisResult"

    CreateProjectInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        artist: { type: string }
        genre: { type: string }
        mood: { type: string }
        visualDirection: { type: string }
        visualStyle: { type: string }
        brandDirection: { type: string }
        lyrics: { type: string }

    UpdateProjectInput:
      type: object
      properties:
        title: { type: string }
        artist: { type: string }
        genre: { type: string }
        mood: { type: string }
        visualDirection: { type: string }
        visualStyle: { type: string }
        brandDirection: { type: string }
        lyrics: { type: string }
        status:
          type: string
          enum: [draft, uploaded, analyzed, storyboarded, prompted, exported]

    AudioFile:
      type: object
      required: [id, projectId, fileName, mimeType, sizeBytes, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        fileName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        durationSec: { type: number }
        createdAt: { type: string, format: date-time }

    UploadAudioInput:
      type: object
      required: [fileName, sizeBytes, mimeType]
      properties:
        fileName: { type: string }
        sizeBytes: { type: integer }
        mimeType: { type: string }
        durationSec: { type: number }

    TimelineSegment:
      type: object
      required:
        - id
        - projectId
        - index
        - startSec
        - endSec
        - section
        - intensity
        - emotion
      properties:
        id: { type: string }
        projectId: { type: string }
        index: { type: integer }
        startSec: { type: number }
        endSec: { type: number }
        section:
          type: string
          enum: [intro, verse, pre_chorus, chorus, bridge, drop, breakdown, outro]
        intensity: { type: number, description: "0..1" }
        emotion: { type: string }
        bpm: { type: number }

    AnalysisResult:
      type: object
      required:
        - projectId
        - durationSec
        - bpm
        - keySignature
        - energy
        - segments
        - emotionalMap
      properties:
        projectId: { type: string }
        durationSec: { type: number }
        bpm: { type: number }
        keySignature: { type: string }
        energy: { type: number }
        loudnessDb: { type: number }
        segments:
          type: array
          items:
            $ref: "#/components/schemas/TimelineSegment"
        emotionalMap:
          type: array
          items:
            $ref: "#/components/schemas/EmotionalPoint"

    SubmitAnalysisInput:
      type: object
      required: [durationSec, bpm, energy, segments, emotionalMap]
      properties:
        durationSec: { type: number }
        bpm: { type: number }
        keySignature: { type: string }
        energy: { type: number }
        loudnessDb: { type: number }
        beats:
          type: array
          items: { type: number }
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SubmitSegmentInput"
        emotionalMap:
          type: array
          items:
            $ref: "#/components/schemas/EmotionalPoint"

    SubmitSegmentInput:
      type: object
      required: [index, startSec, endSec, section, intensity, emotion]
      properties:
        index: { type: integer }
        startSec: { type: number }
        endSec: { type: number }
        section:
          type: string
          enum: [intro, verse, pre_chorus, chorus, bridge, drop, breakdown, outro]
        intensity: { type: number }
        emotion: { type: string }
        bpm: { type: number }

    CreateSegmentInput:
      type: object
      required: [startSec, endSec]
      properties:
        startSec: { type: number }
        endSec: { type: number }
        section:
          type: string
          enum: [intro, verse, pre_chorus, chorus, bridge, drop, breakdown, outro]
        intensity: { type: number }
        emotion: { type: string }

    UpdateSegmentInput:
      type: object
      properties:
        startSec: { type: number }
        endSec: { type: number }
        section:
          type: string
          enum: [intro, verse, pre_chorus, chorus, bridge, drop, breakdown, outro]
        intensity: { type: number }
        emotion: { type: string }

    SplitSegmentInput:
      type: object
      properties:
        atSec: { type: number }

    EmotionalPoint:
      type: object
      required: [timeSec, valence, arousal, label]
      properties:
        timeSec: { type: number }
        valence: { type: number }
        arousal: { type: number }
        label: { type: string }

    StoryboardScene:
      type: object
      required:
        - id
        - projectId
        - index
        - startSec
        - endSec
        - title
        - description
        - shotType
        - cameraMovement
        - location
        - lighting
        - colorPalette
        - environment
        - characterAction
        - emotionalPurpose
        - motionIntensity
        - aiPrompt
        - locked
      properties:
        id: { type: string }
        projectId: { type: string }
        segmentId: { type: string }
        index: { type: integer }
        startSec: { type: number }
        endSec: { type: number }
        title: { type: string }
        description: { type: string }
        shotType: { type: string }
        cameraMovement: { type: string }
        location: { type: string }
        lighting: { type: string }
        colorPalette: { type: string }
        wardrobe: { type: string }
        notes: { type: string }
        environment: { type: string }
        characterAction: { type: string }
