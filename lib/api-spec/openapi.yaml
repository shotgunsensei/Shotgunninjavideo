openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Shotgun Ninjas Video Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: projects
  - name: audio
  - name: timeline
  - name: storyboard
  - name: lyrics
  - name: prompts
  - name: exports
  - name: settings
  - name: stats
  - name: billing
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Dashboard overview stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
    patch:
      operationId: updateProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{id}/audio:
    post:
      operationId: uploadAudio
      tags: [audio]
      summary: Register an uploaded audio file (metadata only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadAudioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioFile"

  /projects/{id}/analyze:
    post:
      operationId: analyzeAudio
      tags: [audio]
      summary: Submit audio analysis (client-computed); falls back to deterministic mock if no body provided
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnalysisInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /projects/{id}/analysis:
    get:
      operationId: getAnalysis
      tags: [audio]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /projects/{id}/timeline:
    get:
      operationId: getTimeline
      tags: [timeline]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /projects/{id}/timeline/segments:
    post:
      operationId: createSegment
      tags: [timeline]
      summary: Insert a new timeline segment at a given time
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /timeline-segments/{segmentId}:
    patch:
      operationId: updateSegment
      tags: [timeline]
      parameters:
        - in: path
          name: segmentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSegmentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"
    delete:
      operationId: deleteSegment
      tags: [timeline]
      parameters:
        - in: path
          name: segmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /timeline-segments/{segmentId}/split:
    post:
      operationId: splitSegment
      tags: [timeline]
      summary: Split a segment in two at the given time (defaults to midpoint)
      parameters:
        - in: path
          name: segmentId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitSegmentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineSegment"

  /projects/{id}/storyboard:
    get:
      operationId: getStoryboard
      tags: [storyboard]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"
    post:
      operationId: generateStoryboard
      tags: [storyboard]
      summary: Generate storyboard scenes from analyzed timeline
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoryboardInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /projects/{id}/storyboard/scenes:
    post:
      operationId: addScene
      tags: [storyboard]
      summary: Add a new storyboard scene (optionally after a given index)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSceneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /storyboard/{sceneId}:
    patch:
      operationId: updateScene
      tags: [storyboard]
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSceneInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardScene"
    delete:
      operationId: deleteScene
      tags: [storyboard]
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /storyboard/{sceneId}/regenerate:
    post:
      operationId: regenerateScene
      tags: [storyboard]
      summary: Regenerate the contents of a single scene (respects locked unless force=true)
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardScene"

  /storyboard/{sceneId}/duplicate:
    post:
      operationId: duplicateScene
      tags: [storyboard]
      summary: Duplicate a scene immediately after itself
      parameters:
        - in: path
          name: sceneId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryboardScene"

  /projects/{id}/lyrics:
    get:
      operationId: getLyrics
      tags: [lyrics]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"
    put:
      operationId: saveLyrics
      tags: [lyrics]
      summary: Replace the project's lyric lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveLyricsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"

  /projects/{id}/lyrics/parse:
    post:
      operationId: parseLyrics
      tags: [lyrics]
      summary: Parse raw lyric text into structured lines (does not save)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseLyricsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseLyricsResult"

  /projects/{id}/lyrics/auto-assign:
    post:
      operationId: autoAssignLyrics
      tags: [lyrics]
      summary: Distribute untimestamped, unassigned lyric lines evenly across storyboard scenes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"

  /lyric-lines/{lineId}:
    patch:
      operationId: updateLyricLine
      tags: [lyrics]
      parameters:
        - in: path
          name: lineId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLyricLineInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LyricLine"
    delete:
      operationId: deleteLyricLine
      tags: [lyrics]
      parameters:
        - in: path
          name: lineId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LyricLine"

  /projects/{id}/prompts:
    get:
      operationId: getPrompts
      tags: [prompts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"
    post:
      operationId: generatePrompts
      tags: [prompts]
      summary: Generate scene prompts from storyboard
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"

  /prompts/{promptId}:
    patch:
      operationId: updatePrompt
      tags: [prompts]
      parameters:
        - in: path
          name: promptId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"

  /projects/{id}/exports:
    get:
      operationId: listExports
      tags: [exports]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExportRecord"
    post:
      operationId: createExport
      tags: [exports]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportRecord"

  /projects/{id}/continuity:
    get:
      operationId: getContinuity
      tags: [continuity]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Continuity"
    put:
      operationId: updateContinuity
      tags: [continuity]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContinuityInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Continuity"

  /projects/{id}/continuity/apply:
    post:
      operationId: applyContinuity
      tags: [continuity]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContinuityApplyResult"

  /projects/{id}/prompt-engine:
    get:
      operationId: getPromptEngine
      tags: [prompts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptEngineResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /billing/plans:
    get:
      operationId: listBillingPlans
      tags: [billing]
      summary: List the static plan catalog
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanCatalogItem"

  /billing:
    get:
      operationId: getBillingState
      tags: [billing]
      summary: Get the current subscription state with usage and feature flags
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingState"

  /billing/upgrade:
    post:
      operationId: upgradeBillingPlan
      tags: [billing]
      summary: Upgrade or switch the current plan (mock — no Stripe yet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradePlanInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingState"

  /billing/cancel:
    post:
      operationId: cancelBillingPlan
      tags: [billing]
      summary: Cancel the current plan and revert to Free (mock)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingState"

  /marketing-assets/catalog:
    get:
      operationId: getMarketingAssetCatalog
      tags: [marketing-assets]
      summary: List supported marketing asset kinds and export formats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingAssetCatalog" }

  /projects/{id}/marketing-assets:
    get:
      operationId: listMarketingAssets
      tags: [marketing-assets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MarketingAsset" }

  /projects/{id}/marketing-assets/generate:
    post:
      operationId: generateMarketingAssets
      tags: [marketing-assets]
      summary: Generate every marketing asset kind for the project (overwrites existing)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MarketingAsset" }

  /projects/{id}/marketing-assets/regenerate:
    post:
      operationId: regenerateMarketingAsset
      tags: [marketing-assets]
      summary: Regenerate a single marketing asset kind
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegenerateMarketingAssetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketingAsset" }

  /projects/{id}/marketing-assets/export/{format}:
    get:
      operationId: exportMarketingAssets
      tags: [marketing-assets]
      summary: Download the marketing asset pack as TXT, CSV, or JSON
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [txt, csv, json]
      responses:
        "200":
          description: OK — body is plain text. Format is signalled by the file
            extension in the Content-Disposition header (.txt / .csv / .json).
            JSON & CSV bodies are valid for downstream parsing.
          content:
            text/plain: { schema: { type: string } }

  /admin/diagnostics:
    get:
      operationId: getAdminDiagnostics
      tags: [admin]
      summary: Get diagnostics for all projects (quality scores, validation, subscription gate state)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/projects/{id}/full:
    get:
      operationId: getAdminProjectFull
      tags: [admin]
      summary: Full JSON dump of every row related to one project
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/projects/{id}/test-export/{format}:
    post:
      operationId: testExportFormat
      tags: [admin]
      summary: Run an export builder against a project without persisting; returns size + preview or error
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [production_plan, txt, json, csv_shot_list, lyrics_timing, ai_prompt_pack, capcut_guide, davinci_guide, treatment, social_captions]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/reset-demo-data:
    post:
      operationId: resetDemoData
      tags: [admin]
      summary: Wipe and re-seed the built-in demo projects
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /brand-presets:
    get:
      operationId: listBrandPresets
      tags: [brand-presets]
      summary: List all brand presets (defaults + user-created)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BrandPreset" }
    post:
      operationId: createBrandPreset
      tags: [brand-presets]
      summary: Create a new brand preset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBrandPresetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrandPreset" }

  /brand-presets/{id}:
    get:
      operationId: getBrandPreset
      tags: [brand-presets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrandPreset" }
        "404":
          description: Not found
    patch:
      operationId: updateBrandPreset
      tags: [brand-presets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateBrandPresetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrandPreset" }
    delete:
      operationId: deleteBrandPreset
      tags: [brand-presets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "409":
          description: Cannot delete a default preset

  /brand-presets/{id}/duplicate:
    post:
      operationId: duplicateBrandPreset
      tags: [brand-presets]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrandPreset" }

  /projects/{id}/apply-brand-preset:
    post:
      operationId: applyBrandPresetToProject
      tags: [brand-presets]
      summary: Apply a brand preset to a project (copies brand fields and links the preset)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplyBrandPresetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }

  /projects/{id}/save-as-brand-preset:
    post:
      operationId: saveProjectAsBrandPreset
      tags: [brand-presets]
      summary: Snapshot the project's current brand fields into a new preset
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveAsBrandPresetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrandPreset" }

